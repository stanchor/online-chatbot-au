<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alupe University Online Assistant</title>
  <link rel="icon" type="image/jpeg" href="https://au.ac.ke/wp-content/uploads/2025/10/AU_Logo25.jpg" />
  <link rel="apple-touch-icon" href="https://au.ac.ke/wp-content/uploads/2025/10/AU_Logo25.jpg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ── Topbar — gold background, white text, always on top ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #F59E0B;
      border-bottom: 3px solid #9B1FBF;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .topbar-info {
      display: flex;
      flex-direction: column;
    }

    .topbar-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    .topbar-sub {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.4);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.4); }
      50%       { box-shadow: 0 0 0 5px rgba(34,197,94,0.15); }
    }

    /* Refresh button — purple bubble */
    .refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #9B1FBF;
      border: none;
      cursor: pointer;
      outline: none;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: #7B189A; }

    .refresh-icon {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .spinning { animation: spin 0.4s ease; }

    /* ── Footer — always on bottom ── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      z-index: 99999;
      background: #ffffff;
      border-top: 3px solid #9B1FBF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #9CA3AF;
    }

    .footer span {
      color: #9B1FBF;
      font-weight: 700;
    }

    /*
      Force flowise-fullchatbot to live strictly between
      topbar (56px + 3px border = 59px) and footer (28px + 3px border = 31px).
      This ensures the input bar is never hidden behind the footer.
    */
    flowise-fullchatbot {
      position: fixed !important;
      top: 59px !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 31px !important;
      width: 100vw !important;
      height: calc(100vh - 90px) !important;
      max-height: calc(100vh - 90px) !important;
      z-index: 1000 !important;
      overflow: hidden !important;
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <img
        class="topbar-logo"
        src="https://au.ac.ke/wp-content/uploads/2025/10/AU_Logo25.jpg"
        alt="AU Logo"
        onerror="this.style.display='none'"
      />
      <div class="topbar-info">
        <span class="topbar-title">Alupe University Online Assistant</span>
        <div class="topbar-sub">
          <div class="status-dot"></div>
          Online &mdash; Alupe University, Kenya
        </div>
      </div>
    </div>

    <button class="refresh-btn" onclick="refreshChat()" title="Start new chat">
      <svg class="refresh-icon" id="refresh-icon" viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>

  <!-- Footer -->
  <div class="footer">
    Built by <span>&nbsp;Stantech&nbsp;</span> &bull; Alupe University Official Assistant
  </div>

  <script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js"

    window.initBot = function() {
      Chatbot.initFull({
        chatflowid: "38d94583-4e21-4ea5-bd0a-aae71b112670",
        apiHost: "https://flowise-production-40d3.up.railway.app",
        theme: {
          chatWindow: {
            showTitle: false,
            welcomeMessage: "Welcome to Alupe University! \uD83C\uDF93 I am your official AI assistant. How can I help you today?",
            backgroundColor: "#9B1FBF",
            fontSize: 15,
            botMessage: {
              backgroundColor: "#BBF7D0",
              textColor: "#111827",
              showAvatar: true,
              avatarSrc: "https://au.ac.ke/wp-content/uploads/2025/10/AU_Logo25.jpg",
            },
            userMessage: {
              backgroundColor: "#1D4ED8",
              textColor: "#ffffff",
              showAvatar: false,
            },
            textInput: {
              placeholder: "Ask me anything about Alupe University...",
              backgroundColor: "#ffffff",
              textColor: "#111827",
              sendButtonColor: "#000000",
            },
            footer: {
              showFooter: false
            }
          }
        }
      })
    }

    window.refreshChat = function() {
      // Remove flowise element completely and reinitialise fresh
      const existing = document.querySelector('flowise-fullchatbot')
      if (existing) existing.remove()
      window.initBot()

      // Spin icon
      const icon = document.getElementById('refresh-icon')
      icon.classList.add('spinning')
      setTimeout(() => icon.classList.remove('spinning'), 400)
    }

    window.initBot()
  </script>

</body>
</html>
